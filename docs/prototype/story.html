  const app = document.getElementById('app');
  function doCopy(txt) {
    let ok = false;
    try {
      const ta = document.createElement('textarea');
      ta.value = txt;
      ta.setAttribute('readonly', '');
      ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
      document.body.appendChild(ta);
      ta.focus(); ta.select(); ta.setSelectionRange(0, txt.length);
      ok = document.execCommand('copy');
      ta.remove();
    } catch (e) {}
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try { navigator.clipboard.writeText(txt).then(() => {}, () => {}); ok = true; } catch (e) {}
    }
    return ok;
  }
  // capture-phase so copying never registers a question answer
  app.addEventListener('click', function (e) {
    const b = e.target.closest && e.target.closest('.copyp');
    if (!b) return;
    e.preventDefault(); e.stopPropagation();
    doCopy(b.dataset.prompt || '');
    const t = b.querySelector('.copyp-t');
    if (t) { const o = t.textContent; t.textContent = 'Copied!'; b.style.background = 'rgba(46,125,36,.92)'; setTimeout(() => { t.textContent = o; b.style.background = 'rgba(15,25,35,.7)'; }, 1200); }
  }, true);
  const headTitle = document.getElementById('headTitle');
  const back = document.getElementById('back');
  const backLabel = document.getElementById('backLabel');

  function slot(id, ph, extraAttr, chipPos) {
    const pos = chipPos === 'top' ? 'right:7px;top:7px;' : 'right:7px;bottom:7px;';
    return `<image-slot id="${id}" shape="rect" fit="cover" placeholder="${LU.esc(ph)}" ${extraAttr || ''}></image-slot>`
      + `<span class="copyp" role="button" tabindex="0" title="Copy image prompt" data-prompt="${LU.esc(ph)}" style="position:absolute;${pos}z-index:20;display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:9px;background:rgba(15,25,35,.7);color:#fff;font-family:'Baloo 2',sans-serif;font-weight:800;font-size:11px;line-height:1;cursor:pointer;backdrop-filter:blur(4px);box-shadow:0 2px 6px rgba(0,0,0,.3)">⧉ <span class="copyp-t">Copy prompt</span></span>`;
  }

  /* ---------- credit / progress ---------- */
  function credit() { try { return JSON.parse(LU.storeGet('lu_story_credit') || '{}'); } catch (e) { return {}; } }
  function saveCredit(c) { try { LU.storeSet('lu_story_credit', JSON.stringify(c)); } catch (e) {} }

  /* ================= LIBRARY ================= */
  function renderLibrary() {

    const intro = `<div class="flex items-center gap-4 bg-white rounded-[24px] px-6 py-4 mb-6" style="box-shadow:0 10px 26px rgba(60,40,90,.1);border:1px solid rgba(0,0,0,.04)">

      <div><div class="font-baloo font-extrabold text-[20px]" style="color:#25455e">Pick a story to read!</div>
      <div class="font-bold text-[14.5px]" style="color:#5b7686">Tap a book. Read each page, then answer the picture questions.</div></div>
    </div>`;

    const cards = STORIES.map((st, i) => {
      const isSingle = st.mode === 'single';
      const tag = isSingle ? 'Reading story' : 'Picture book';
      const meta = isSingle
        ? `${st.pages.length} parts \u00b7 ${st.questions.length} questions`
        : `${st.pages.length} pages \u00b7 ${st.questions.length} questions`;
      return `<a href="story.html?story=${st.id}" class="group block bg-white rounded-[24px] overflow-hidden" style="box-shadow:0 10px 24px rgba(60,40,90,.12);border:1px solid rgba(0,0,0,.05)">
        <div class="h-[10px]" style="background:${st.accent}"></div>
        <div class="p-4">
          <div class="relative rounded-[16px] overflow-hidden" style="aspect-ratio:3/4;box-shadow:0 6px 14px rgba(60,40,90,.14)">
            ${slot('story-' + st.id + '-cover', ART + st.cover, '', 'top')}
            <span class="absolute left-2.5 top-2.5 z-10 pointer-events-none font-baloo font-extrabold text-[10px] tracking-wide rounded-full px-2.5 py-1" style="background:rgba(255,255,255,.92);color:${st.accent}">${tag}</span>
            <div class="absolute left-0 right-0 bottom-0 px-3 py-2 pointer-events-none" style="background:linear-gradient(0deg,rgba(0,0,0,.55),transparent)">
              <span class="font-baloo font-extrabold text-white text-[11px] tracking-wide">A Learning Universe Story</span>
            </div>
          </div>
          <div class="flex items-center justify-between gap-2 mt-3">
            <div class="min-w-0">
              <div class="font-baloo font-extrabold text-[19px] leading-tight truncate" style="color:#25455e">${LU.esc(st.title)}</div>
              <div class="font-bold text-[12.5px]" style="color:#8a9aa6">${meta}</div>
            </div>
            <span class="flex-none font-baloo font-extrabold text-white text-[14px] rounded-[14px] px-4 py-2.5 transition-transform group-hover:scale-[1.04]" style="background:${st.accent};box-shadow:0 4px 0 rgba(0,0,0,.18)">Read</span>
          </div>
        </div>
      </a>`;
    }).join('');

    app.innerHTML = intro + `<div class="grid gap-5" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))">${cards}</div>`;

  function readCount() { return 0; }

          </div>
        </div>
        <div class="font-baloo font-extrabold text-[20px] text-center mt-2.5 leading-tight" style="color:#25455e">${LU.esc(st.title)}</div>
        <button id="copyAll" class="w-full mt-3 font-baloo font-extrabold text-[13px] rounded-[13px] px-3 py-2.5 flex items-center justify-center gap-1.5" style="background:${st.tint};color:${st.accent};border:2px solid ${st.accent}33">\u29c9 <span id="copyAllT">Copy all prompts</span></button>
      </div>
    </div>`;

    const isSingle = st.mode === 'single';

    // page tiles (picture books) or text parts (single-cover stories)
    const pages = isSingle
      ? st.pages.map((p, i) => `<div class="bg-white rounded-[18px] px-5 py-4 flex items-start gap-3.5" style="box-shadow:0 6px 16px rgba(60,40,90,.09);border:1px solid rgba(0,0,0,.05)">
          <span class="flex-none font-baloo font-extrabold text-white text-[15px] rounded-full flex items-center justify-center mt-0.5" style="width:32px;height:32px;background:${st.accent}">${i + 1}</span>
          <span class="font-baloo font-extrabold text-[21px] leading-snug" style="color:#2b3f4c;text-wrap:pretty">${LU.esc(p.text)}</span>
        </div>`).join('')
      : st.pages.map((p, i) => `<div class="bg-white rounded-[20px] overflow-hidden flex flex-col" style="box-shadow:0 8px 20px rgba(60,40,90,.1);border:1px solid rgba(0,0,0,.05)">
          <div class="relative" style="aspect-ratio:4/3">
            ${slot('story-' + st.id + '-p' + i, ART + p.img)}
            <span class="absolute left-2.5 top-2.5 z-10 pointer-events-none font-baloo font-extrabold text-white text-[12px] rounded-[10px] px-2.5 py-1" style="background:${st.accent};box-shadow:0 3px 8px rgba(0,0,0,.25)">Page ${i + 1}</span>
          </div>
          <div class="px-4 py-3.5 flex-1 flex items-center justify-center">
            <span class="font-baloo font-extrabold text-[22px] leading-snug text-center" style="color:#2b3f4c;text-wrap:balance">${LU.esc(p.text)}</span>
          </div>
        </div>`).join('');

    // question tiles (picture answers) or text-answer buttons
    const qs = st.questions.map((q, qi) => {
      const cells = isSingle
        ? q.choices.map((c, ci) => `<button class="qchoice relative rounded-[14px] transition-transform text-left" data-correct="${c.correct ? 1 : 0}" style="border:3px solid rgba(0,0,0,.08);background:#fff;padding:13px 16px">
            <span class="font-baloo font-extrabold text-[16px]" style="color:#25455e">${LU.esc(c.label)}</span>
          </button>`).join('')
        : q.choices.map((c, ci) => `<button class="qchoice relative rounded-[14px] overflow-hidden transition-transform" data-correct="${c.correct ? 1 : 0}" style="aspect-ratio:1;border:3px solid rgba(0,0,0,.08);background:#fff">
            ${slot('story-' + st.id + '-q' + qi + '-c' + ci, ART + c.img, 'style="pointer-events:none"')}
          </button>`).join('');
      const choicesGrid = isSingle ? 'grid grid-cols-1 gap-2' : 'grid grid-cols-3 gap-2.5';
      return `<div class="qcard bg-white rounded-[20px] overflow-hidden" data-q="${qi}" style="box-shadow:0 8px 20px rgba(60,40,90,.1);border:1px solid rgba(0,0,0,.05)">
        <div class="flex items-center gap-2 px-4 py-2.5" style="background:${st.tint}">
          <span class="font-baloo font-extrabold text-[13px]" style="color:${st.accent}">Question ${qi + 1}</span>
        </div>
        <div class="p-4">
          <div class="font-baloo font-extrabold text-[18px] mb-3" style="color:#25455e">${LU.esc(q.q)}</div>
          <div class="${choicesGrid}">${cells}</div>
          <div class="qfb flex items-center gap-1.5 mt-3 font-baloo font-extrabold text-[14px] h-[20px]" style="opacity:0;transition:opacity .2s"></div>
        </div>
      </div>`;
    }).join('');

    const pagesWrap = isSingle
      ? `<div class="grid gap-3.5" style="grid-template-columns:1fr;max-width:640px">${pages}</div>`
      : `<div class="grid gap-4" style="grid-template-columns:repeat(auto-fill,minmax(230px,1fr))">${pages}</div>`;

    app.innerHTML = `
      <div class="flex gap-6 flex-wrap items-start">
        ${cover}
        <div class="flex-1 min-w-[280px]">${pagesWrap}</div>
      </div>
      <div class="flex items-center gap-2 mt-9 mb-3 ml-1">
        <img src="universe/dragon/dragon_thinking.png" alt="" class="w-[40px] h-[44px] object-contain">
        <span class="font-baloo font-extrabold text-[20px]" style="color:#25455e">Let\u2019s check what you read!</span>
      </div>
      <div class="grid gap-4" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr))">${qs}</div>`;

    bindQuestions(st);

    const ca = document.getElementById('copyAll');
    if (ca) ca.addEventListener('click', () => {
      const lines = ['Story: ' + st.title, '', 'COVER: ' + ART + st.cover, ''];
      if (st.mode === 'single') {
        lines.push('STORY TEXT:');
        st.pages.forEach((p, i) => lines.push('  ' + (i + 1) + '. ' + p.text));
        lines.push('', 'QUESTIONS:');
        st.questions.forEach((q, qi) => {
          lines.push('Q' + (qi + 1) + ' \u2014 ' + q.q);
          q.choices.forEach((c, ci) => lines.push('  ' + String.fromCharCode(65 + ci) + (c.correct ? ' (correct)' : '') + ': ' + c.label));
        });
      } else {
        st.pages.forEach((p, i) => lines.push('PAGE ' + (i + 1) + ' \u2014 \u201c' + p.text + '\u201d: ' + ART + p.img));
        lines.push('');
        st.questions.forEach((q, qi) => {
          lines.push('QUESTION ' + (qi + 1) + ' \u2014 ' + q.q);
          q.choices.forEach((c, ci) => lines.push('  ' + String.fromCharCode(65 + ci) + (c.correct ? ' (correct)' : '') + ': ' + ART + c.img));
        });
      }
      const txt = lines.join('\n');
      doCopy(txt);
      const t = document.getElementById('copyAllT');
      t.textContent = 'Copied all!'; setTimeout(() => { t.textContent = 'Copy all prompts'; }, 1400);
    });
  }

  function bindQuestions(st) {
    app.querySelectorAll('.qcard').forEach(card => {
      const qi = +card.dataset.q;
      const fb = card.querySelector('.qfb');
      let done = false;
      card.querySelectorAll('.qchoice').forEach(btn => {
        btn.addEventListener('click', () => {
          if (done) return;
          if (btn.dataset.correct === '1') {
            done = true;
            btn.style.borderColor = '#3fae4a';
            btn.style.boxShadow = '0 0 0 4px #3fae4a55,0 6px 16px rgba(60,40,90,.14)';
            btn.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.06)' }, { transform: 'scale(1)' }], { duration: 320 });
            card.querySelectorAll('.qchoice').forEach(o => { if (o !== btn) o.style.opacity = '.5'; });
            fb.innerHTML = '<span style="color:#2E7D24">\u2605 Yes! Well done!</span>';
            fb.style.opacity = '1';
            award(st, qi);
          } else {
            btn.style.borderColor = '#e46161';
            btn.animate([{ transform: 'translateX(0)' }, { transform: 'translateX(-7px)' }, { transform: 'translateX(7px)' }, { transform: 'translateX(0)' }], { duration: 300 });
            setTimeout(() => { btn.style.borderColor = 'rgba(0,0,0,.08)'; }, 700);
            fb.innerHTML = '<span style="color:#C25B12">Not quite \u2014 try again!</span>';
            fb.style.opacity = '1';
          }
        });
      });
    });
  }

  function award(st, qi) {
    const key = st.id + ':q' + qi;
    const c = credit();
    if (c[key]) return;
    c[key] = 1; saveCredit(c);
    S.stars += 3; LU.save(S);
    const el = document.getElementById('starCount');
    el.textContent = S.stars;
    el.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.35)' }, { transform: 'scale(1)' }], { duration: 420 });
  }

  /* ---------- route ---------- */
  const id = LU.qs('story');
  const st = STORIES.find(s => s.id === id);
  if (st) renderReader(st); else renderLibrary();
})();
</script>
</body>
</html>
