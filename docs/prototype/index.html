<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning Universe</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="lu.css">
</head>
<body>
<div id="home" class="relative min-h-screen overflow-hidden" style="background:radial-gradient(120% 90% at 50% 6%,#8a6ce0 0%,#6a4dc0 38%,#4c39a0 68%,#3f2f8e 100%)">
  <div id="stars" class="absolute inset-0 pointer-events-none"></div>
  <img src="universe/decorative/cloud_large_left.png" alt="" class="absolute pointer-events-none" style="left:-50px;bottom:-24px;width:380px;opacity:.92;z-index:1">
  <img src="universe/decorative/cloud_large_center.png" alt="" class="absolute pointer-events-none" style="right:-40px;bottom:-30px;width:440px;opacity:.92;z-index:1">
  <img src="universe/decorative/cloud_small_center.png" alt="" class="absolute pointer-events-none" style="left:44%;bottom:-16px;width:240px;opacity:.85;z-index:1">

  <!-- top bar -->
  <div class="relative z-10 flex items-start justify-between gap-4 px-7 pt-5 pb-1.5 flex-wrap">
    <div class="flex items-center gap-2">
      <img src="universe/dragon/dragon_wave.png" alt="Aki the dragon" class="w-[92px] h-[92px] object-contain lu-bob" style="filter:drop-shadow(0 8px 12px rgba(0,0,0,.25))">
      <div class="relative bg-white rounded-[20px] px-4 py-3 max-w-[236px]" style="box-shadow:0 8px 18px rgba(30,10,70,.28)">
        <div class="font-baloo font-extrabold text-[13px] tracking-wide" style="color:#2C9AA6" id="mascotName">Aki</div>
        <div class="font-bold text-[13.5px] leading-tight" style="color:#6b5e8c" id="greeting">Where shall we explore today?</div>
      </div>
    </div>
    <img src="universe/ui/logo_learning_universe.png" alt="Learning Universe" class="w-[250px] object-contain mt-1" style="filter:drop-shadow(0 6px 12px rgba(20,0,60,.3))">
    <div class="flex items-center gap-2.5">
      <div class="flex items-center gap-1.5 rounded-full pl-1.5 pr-4 py-1" style="background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.32)"><img src="universe/rewards/star_gold.png" alt="stars" class="w-[30px] h-[30px] object-contain"><span class="font-baloo font-extrabold text-white text-[17px]" id="starCount">34</span></div>
      <a href="rewards.html" aria-label="Rewards"><img src="universe/ui/rewards_button.png" alt="" class="w-[50px] h-[57px] object-contain"></a>
      <a href="parent.html" aria-label="Grown-up settings"><img src="universe/ui/settings_button.png" alt="" class="w-[46px] h-[50px] object-contain"></a>
      <a href="parent.html" class="flex items-center gap-2.5 rounded-full pl-1.5 pr-4 py-1" style="background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.32)">
        <img src="universe/ui/profile_avatar.png" alt="" class="w-[44px] h-[44px] object-contain">
        <span class="text-left"><span class="block font-baloo font-extrabold text-white text-[15px]" id="childName">Zane</span><span class="block font-bold text-[11.5px]" style="color:#e3d7ff" id="levelLabel">Level 4</span></span>
      </a>
    </div>
  </div>

  <!-- worlds -->
  <div id="worlds" class="relative z-[2] flex flex-wrap items-center justify-center gap-y-1 gap-x-6 px-6 pt-1 pb-8 max-w-[1180px] mx-auto"></div>

  <!-- bottom nav -->
  <div id="nav" class="relative z-10 flex items-end justify-center gap-5 px-6 pb-5"></div>
</div>

<script src="lu.js"></script>
<script>
(function () {
  const S = LU.load();
  document.getElementById('starCount').textContent = S.stars;
  document.getElementById('childName').textContent = S.child;
  document.getElementById('mascotName').textContent = S.mascot;
  document.getElementById('levelLabel').textContent = 'Level ' + S.level;
  document.getElementById('greeting').textContent = 'Where shall we explore today, ' + S.child + '?';

  // stars
  const starSrcs = ['star_gold_small', 'sparkle_gold', 'sparkle_blue', 'sparkle_purple', 'star_gold_medium'].map(n => 'universe/decorative/' + n + '.png');
  const pos = [[6, 20, 26], [15, 62, 20], [24, 12, 30], [30, 84, 34], [12, 40, 18], [42, 6, 26], [50, 90, 22], [60, 30, 20], [8, 78, 22], [38, 52, 16]];
  document.getElementById('stars').innerHTML = pos.map((p, i) =>
    `<div style="position:absolute;top:${p[0]}%;left:${p[1]}%;width:${p[2]}px;height:${p[2]}px;background:url(${starSrcs[i % starSrcs.length]}) center/contain no-repeat;animation:luTwinkle ${2.4 + (i % 4) * 0.6}s ease-in-out ${i * 0.3}s infinite"></div>`).join('');

  // worlds
  const geo = { english: [258, 250, 56], maths: [186, 232, 2], science: [210, 250, 14], shona: [222, 232, 66], mandarin: [200, 250, 30], social: [232, 216, 22] };
  document.getElementById('worlds').innerHTML = LU.SUBJECTS.map((s, i) => {
    const g = geo[s.id]; const rec = s.id === 'english';
    const rk = LU.rank(S, s.id);
    return `<a href="world.html?subject=${s.id}" class="relative bg-transparent lu-float" style="width:${g[0]}px;height:${g[1]}px;margin-top:${g[2]}px;animation-duration:${5 + i * 0.7}s;animation-delay:${i * 0.4}s">
      ${rec ? `<span class="absolute left-1/2 -translate-x-1/2 -top-1 z-[4] whitespace-nowrap font-baloo font-extrabold text-[11.5px] rounded-full px-3 py-[3px]" style="color:#B4770B;background:#FFF3CE;border:2px solid #F5D269;box-shadow:0 4px 10px rgba(0,0,0,.2)">★ Pick up here</span>` : ''}
      <img src="${s.card}" alt="${s.name}" class="w-full h-full object-contain" style="filter:drop-shadow(0 14px 18px rgba(20,0,50,.34))">
      <span class="absolute left-1/2 -translate-x-1/2 bottom-0 z-[4] whitespace-nowrap font-baloo font-extrabold text-[11px] rounded-full px-3 py-[3px]" style="color:#fff;background:rgba(25,8,64,.55);border:2px solid rgba(255,255,255,.35);backdrop-filter:blur(3px)">🏅 ${LU.esc(rk.name)}</span>
    </a>`;
  }).join('');

  // bottom nav
  const nav = [
    { icon: 'nav_home', label: 'Home', href: 'index.html' },
    { icon: 'nav_worlds', label: 'Worlds', href: 'index.html' },
    { icon: 'nav_quests', label: 'Quests', href: 'lesson.html?subject=english&badge=' + LU.recommendedBadge(S, 'english').id },
    { icon: 'nav_badges', label: 'Badges', href: 'rewards.html' },
    { icon: 'nav_profile', label: 'Profile', href: 'parent.html' },
  ];
  document.getElementById('nav').innerHTML = nav.map((n, i) =>
    `<a href="${n.href}" aria-label="${n.label}" class="block" style="width:${i === 0 ? 66 : 60}px;height:${i === 0 ? 74 : 68}px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25))"><img src="universe/ui/${n.icon}.png" alt="${n.label}" class="w-full h-full object-contain"></a>`).join('');
})();
</script>
</body>
</html>
