<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Learning Universe</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="universe/ui/fontawesome/css/fontawesome.min.css">
<link rel="stylesheet" href="universe/ui/fontawesome/css/solid.min.css">
<link rel="stylesheet" href="lu.css">
</head>
<body>
<div id="home" class="relative min-h-screen overflow-x-hidden" style="background:radial-gradient(120% 90% at 50% 6%,#8a6ce0 0%,#6a4dc0 38%,#4c39a0 68%,#3f2f8e 100%)">
  <div id="stars" class="absolute inset-0 pointer-events-none"></div>
  <img src="universe/decorative/cloud_large_left.png" alt="" class="absolute pointer-events-none" style="left:-50px;bottom:-24px;width:380px;opacity:.92;z-index:1">
  <img src="universe/decorative/cloud_large_center.png" alt="" class="absolute pointer-events-none" style="right:-40px;bottom:-30px;width:440px;opacity:.92;z-index:1">
  <img src="universe/decorative/cloud_small_center.png" alt="" class="absolute pointer-events-none" style="left:44%;bottom:-16px;width:240px;opacity:.85;z-index:1">

  <!-- top bar -->
  <div class="relative z-10 flex items-start justify-between gap-4 px-7 pt-5 pb-1.5 flex-wrap">
    <div class="flex shrink-0 items-center gap-2">
      <img src="universe/dragon/dragon_wave.png" alt="Aki the dragon" class="w-[92px] h-[92px] object-contain lu-bob" style="filter:drop-shadow(0 8px 12px rgba(0,0,0,.25))">
      <div class="relative bg-white rounded-[20px] px-4 py-3 max-w-[236px]" style="box-shadow:0 8px 18px rgba(30,10,70,.28)">
        <div class="font-baloo font-extrabold text-[13px] tracking-wide" style="color:#2C9AA6" id="mascotName">Aki</div>
        <div class="font-bold text-[13.5px] leading-tight" style="color:#6b5e8c" id="greeting">Where shall we explore today?</div>
      </div>
    </div>
    <img src="universe/ui/logo_learning_universe.png" alt="Learning Universe" class="w-[250px] object-contain mt-1" style="filter:drop-shadow(0 6px 12px rgba(20,0,60,.3))">
    <div class="flex shrink-0 items-center gap-2.5">
      <div class="flex items-center gap-2 rounded-full pl-3 pr-4 py-2" style="background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.32)"><i aria-hidden="true" class="lu-fa lu-control-icon fa-solid fa-star text-[#FFD43B] text-[25px] w-[25px] h-[25px]"></i><span class="font-baloo font-extrabold text-white text-[17px]" id="starCount">34</span></div>
      <a href="rewards.html" aria-label="Rewards" class="lu-icon-button text-[#FFD43B]"><i aria-hidden="true" class="lu-fa lu-control-icon fa-solid fa-gift text-[24px]"></i></a>
      <a href="parent.html" aria-label="Grown-up settings" class="lu-icon-button text-white"><i aria-hidden="true" class="lu-fa lu-control-icon fa-solid fa-gear text-[24px]"></i></a>
      <a href="parent.html" class="flex shrink-0 items-center gap-2.5 rounded-full pl-1.5 pr-4 py-1" style="background:rgba(255,255,255,.16);border:2px solid rgba(255,255,255,.32)">
        <i aria-hidden="true" class="lu-fa lu-control-icon fa-solid fa-circle-user text-[#d8d0ff] text-[38px] w-[38px] h-[38px]"></i>
        <span class="text-left"><span class="block font-baloo font-extrabold text-white text-[15px]" id="childName">Zane</span><span class="block font-bold text-[11.5px]" style="color:#e3d7ff" id="levelLabel">Level 4</span></span>
      </a>
    </div>
  </div>

  <!-- worlds -->
  <div id="worlds" class="relative z-[2] mx-auto flex max-w-[1240px] flex-wrap items-end justify-center gap-x-3 gap-y-1 px-6 pb-8 pt-1"></div>

  <!-- bottom nav -->
  <div id="nav" class="lu-nav-bar relative z-10 flex items-end justify-center px-6 pb-5"></div>
</div>

<script src="lu.js"></script>
<script>
(function () {
  const S = LU.load();
  document.getElementById('starCount').textContent = S.stars;
  document.getElementById('childName').textContent = S.child;
  document.getElementById('mascotName').textContent = S.mascot;
  document.getElementById('levelLabel').textContent = 'Level ' + S.level;
  document.getElementById('greeting').textContent = 'Where shall we explore today, ' + S.child + '?';

  // stars
  const starSrcs = ['star_gold_small', 'sparkle_gold', 'sparkle_blue', 'sparkle_purple', 'star_gold_medium'].map(n => 'universe/decorative/' + n + '.png');
  const pos = [[6, 20, 26], [15, 62, 20], [24, 12, 30], [30, 84, 34], [12, 40, 18], [42, 6, 26], [50, 90, 22], [60, 30, 20], [8, 78, 22], [38, 52, 16]];
  document.getElementById('stars').innerHTML = pos.map((p, i) =>
    `<div style="position:absolute;top:${p[0]}%;left:${p[1]}%;width:${p[2]}px;height:${p[2]}px;background:url(${starSrcs[i % starSrcs.length]}) center/contain no-repeat;animation:luTwinkle ${2.4 + (i % 4) * 0.6}s ease-in-out ${i * 0.3}s infinite"></div>`).join('');

  // worlds
  const geo = { english: [250, 218, 56], maths: [205, 238, 2], science: [205, 244, 14], shona: [222, 222, 66], mandarin: [205, 240, 30] };
  const recommendedSubjectId = LU.SUBJECTS.find(s => LU.doneCount(S, s.id) < s.badges.length)?.id;
  document.getElementById('worlds').innerHTML = LU.SUBJECTS.map((s, i) => {
    const g = geo[s.id] || [210, 232, 24];
    const earned = LU.doneCount(S, s.id);
    const total = s.badges.length;
    const progress = total ? Math.round((earned / total) * 100) : 0;
    const next = earned === total ? 'World complete!' : `${earned ? 'Next' : 'Start'}: ${LU.recommendedBadge(S, s.id).name}`;
    const rec = s.id === recommendedSubjectId;
    return `<a href="world.html?subject=${s.id}" class="relative block rounded-[26px] bg-transparent lu-float focus:outline-none focus:ring-4 focus:ring-white/80" style="width:${g[0]}px;height:${g[1] + 108}px;margin-top:${g[2]}px;animation-duration:${5 + i * 0.7}s;animation-delay:${i * 0.4}s">
      ${rec ? `<span class="absolute left-1/2 -translate-x-1/2 -top-1 z-[4] whitespace-nowrap font-baloo font-extrabold text-[11.5px] rounded-full px-3 py-[3px]" style="color:#B4770B;background:#FFF3CE;border:2px solid #F5D269;box-shadow:0 4px 10px rgba(0,0,0,.2)">★ Pick up here</span>` : ''}
      <img src="${s.card}" alt="" class="absolute left-0 top-0 z-[1] w-full object-contain object-bottom" style="height:${g[1]}px;filter:drop-shadow(0 14px 18px rgba(20,0,50,.34))">
      <div class="absolute inset-x-1 bottom-0 z-[3] overflow-hidden rounded-[24px] border-[3px] bg-white px-3.5 pb-3 pt-3 text-center" style="border-color:${s.accent}55;box-shadow:0 10px 18px rgba(20,0,50,.28)">
        <span aria-hidden="true" class="absolute inset-0 opacity-70" style="background:linear-gradient(180deg,#fff 45%,${s.chip} 100%)"></span>
        <div class="relative">
          <h2 class="font-baloo text-[19px] font-extrabold uppercase leading-none tracking-[0.01em]" style="color:${s.accent}">${s.name}</h2>
          <div role="progressbar" aria-label="${s.name}: ${earned} of ${total} badges earned" aria-valuemin="0" aria-valuemax="${total}" aria-valuenow="${earned}" class="mx-auto mt-2 h-[13px] overflow-hidden rounded-full border-2 bg-[#ddd8ef]" style="border-color:${s.accent}66">
            <span class="block h-full rounded-full transition-[width] duration-500" style="width:${progress}%;background:linear-gradient(90deg,${s.accent},#FFD64D)"></span>
          </div>
          <p class="mt-1 font-baloo text-[14px] font-extrabold uppercase leading-none" style="color:${s.accent}">${earned}/${total} badges</p>
          <p class="mt-1.5 truncate text-[10.5px] font-extrabold uppercase leading-none tracking-wide" style="color:${s.accent}">${next}</p>
        </div>
      </div>
    </a>`;
  }).join('');

  // bottom nav
  const nav = [
    { icon: 'house', label: 'Home', href: 'index.html' },
    { icon: 'globe', label: 'Worlds', href: 'index.html' },
    { icon: 'book-open', label: 'Quests', href: 'lesson.html?subject=english&badge=' + LU.recommendedBadge(S, 'english').id },
    { icon: 'trophy', label: 'Badges', href: 'rewards.html' },
    { icon: 'user', label: 'Profile', href: 'parent.html' },
  ];
  document.getElementById('nav').innerHTML = nav.map((n, i) =>
    `<a href="${n.href}" class="lu-nav-item${i === 0 ? ' is-active' : ''}"${i === 0 ? ' aria-current="page"' : ''}><i aria-hidden="true" class="lu-fa fa-solid fa-${n.icon}"></i><span class="lu-nav-label">${n.label}</span></a>`).join('');
})();
</script>
</body>
</html>
